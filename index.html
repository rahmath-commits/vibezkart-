<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibezKart Pro</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 70px; background: #f4f4f4; }
        header { background: #333; color: white; padding: 15px; text-align: center; }
        .filter-bar { display: flex; overflow-x: auto; padding: 10px; background: #fff; gap: 10px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: white; padding: 10px; border-radius: 10px; text-align: center; }
        .card img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #fff; padding: 15px 0; border-top: 1px solid #ddd; }
        .page { display: none; } .active { display: block; }
    </style>
</head>
<body>

<header><h1>VibezKart</h1></header>

<div id="home" class="page active">
    <div class="filter-bar">
        <button onclick="renderProducts('Electronics')">Electronics</button>
        <button onclick="renderProducts('Fashion')">Fashion</button>
        <button onclick="renderProducts('Groceries')">Groceries</button>
    </div>
    <div id="product-container" class="product-grid"></div>
</div>

<div id="cart" class="page"><h2>Your Cart</h2></div>

<div class="nav-bar">
    <div onclick="showPage('home')">Home</div>
    <div onclick="showPage('cart')">Cart</div>
</div>

<script>
    const products = [
        { cat: "Electronics", name: "Headphone", price: "₹999", img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200" },

        { cat: "Electronics", name: "Camera", price: "₹45000", img: "https://images.unsplash.com/photo-1511556532299-8f662526c06a?w=200" },
        { cat: "Electronics", name: "Gaming Mouse", price: "₹799", img: "https://images.unsplash.com/photo-1555529669-e69e73004f47?w=200" },
        { cat: "Electronics", name: "Laptop", price: "₹35000", img: "https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=200" },
        { cat: "Electronics", name: "Keyboard", price: "₹1200", img: "https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=200" },
        { cat: "Electronics", name: "Speaker", price: "₹2500", img: "https://images.unsplash.com/photo-1545454675-3531b5402efd?w=200" },
        { cat: "Electronics", name: "Tablet", price: "₹15000", img: "https://images.unsplash.com/photo-1542751110-d866a401c448?w=200" },
        { cat: "Electronics", name: "Power Bank", price: "₹900", img: "https://images.unsplash.com/photo-1609592882859-994191632001?w=200" },
        { cat: "Electronics", name: "Monitor", price: "₹8000", img: "https://images.unsplash.com/photo-1527443224154-c4a3942d3a35?w=200" },
        { cat: "Fashion", name: "Running Shoes", price: "₹2999", img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200" },
        { cat: "Fashion", name: "Sunglasses", price: "₹399", img: "https://images.unsplash.com/photo-1544441893-675973e31985?w=200" },
        { cat: "Fashion", name: "Handbag", price: "₹1200", img: "https://images.unsplash.com/photo-1590874103328-e638a683404c?w=200" },
        { cat: "Fashion", name: "T-Shirt", price: "₹499", img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=200" },

        { cat: "Groceries", name: "Banana", price: "₹50", img: "https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?w=200" },

        { cat: "Groceries", name: "Tea", price: "₹200", img: "https://images.unsplash.com/photo-1564890369478-c89da6d94928?w=200" },
        { cat: "Groceries", name: "Rice", price: "₹80", img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?w=200" }
    ];

    function renderProducts(category) {
        const container = document.getElementById('product-container');
        container.innerHTML = '';
        products.filter(p => p.cat === category).forEach(p => {
            container.innerHTML += `
                <div class="card">
                    <img src="${p.img}">
                    <p>${p.name}</p>
                    <strong>${p.price}</strong>
                    <button onclick="alert('Added!')">Add</button>
                </div>`;
        });
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Default load
    window.onload = () => renderProducts('Electronics');
</script>
</body>
</html>
