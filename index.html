<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibezKart Pro</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 70px; background: #f4f4f4; }
        header { background: #333; color: white; padding: 15px; text-align: center; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #fff; padding: 15px 0; border-top: 2px solid #ddd; }
        button { background: #ff9800; border: none; padding: 10px; color: white; border-radius: 5px; cursor: pointer; width: 100%; }
        .nav-item { cursor: pointer; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<header><h1>VibezKart</h1></header>

<div id="home" class="page active">
    <h2>Categories</h2>
    <p>Electronics | Fashion | Groceries</p>
    <div style="background:white; padding:15px; border-radius:8px;">
        <h3>Fresh Organic Blueberries</h3>
        <p>Price: ₹199</p>
        <button onclick="alert('Added to Cart!')">Add to Cart</button>
    </div>
</div>

<div id="wishlist" class="page"><h2>Wishlist</h2><p>Your saved items will be here.</p></div>
<div id="cart" class="page"><h2>Your Cart</h2><p>Items you added.</p></div>
<div id="profile" class="page"><h2>Profile</h2><p>Settings & Account details.</p></div>

<div class="nav-bar">
    <div class="nav-item" onclick="showPage('home')">Home</div>
    <div class="nav-item" onclick="showPage('wishlist')">Wishlist</div>
    <div class="nav-item" onclick="showPage('cart')">Cart</div>
    <div class="nav-item" onclick="showPage('profile')">Profile</div>
</div>

<script>
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }
</script>
</body>
</html>
